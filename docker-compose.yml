services:
  postgres:
    image: postgres:17-alpine
    container_name: visitas_postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:24-alpine
    container_name: visitas_api
    working_dir: /workspace
    network_mode: host
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @visitas/api exec prisma migrate deploy && pnpm --filter @visitas/api db:seed && pnpm --filter @visitas/api dev"
    env_file:
      - .env
    environment:
      CI: "true"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}?schema=public"
    volumes:
      - .:/workspace
      - api_root_node_modules:/workspace/node_modules
      - api_app_node_modules:/workspace/apps/api/node_modules
      - api_web_node_modules:/workspace/apps/web/node_modules
      - api_shared_node_modules:/workspace/packages/shared/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:'' + (process.env.API_PORT || 4000) + ''/api/v1/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: node:24-alpine
    container_name: visitas_web
    working_dir: /workspace
    network_mode: host
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @visitas/web dev --host 0.0.0.0"
    env_file:
      - .env
    environment:
      CI: "true"
    volumes:
      - .:/workspace
      - web_root_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
      - web_api_node_modules:/workspace/apps/api/node_modules
      - web_shared_node_modules:/workspace/packages/shared/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  api_root_node_modules:
  api_app_node_modules:
  api_web_node_modules:
  api_shared_node_modules:
  web_root_node_modules:
  web_app_node_modules:
  web_api_node_modules:
  web_shared_node_modules:
